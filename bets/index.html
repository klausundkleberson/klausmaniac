<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wettbüro – KlausManiac</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --neon-yellow: #f5ff00;
    --neon-blue:   #00d4ff;
    --neon-orange: #ff6a00;
    --neon-green:  #00ff88;
    --neon-red:    #ff003c;
    --card: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #555;
  }

  body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); position: relative; overflow-x: hidden; }

  .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; opacity: 0.45; z-index: 0; }
  .blob-1 { width: 500px; height: 500px; top: -15%; left: -10%; background: var(--neon-blue); animation: drift1 9s ease-in-out infinite alternate; }
  .blob-2 { width: 350px; height: 350px; bottom: -5%; right: -5%; background: var(--neon-orange); animation: drift2 11s ease-in-out infinite alternate; }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(30px,40px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-40px,-30px); } }

  .grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 36px 36px; pointer-events: none; z-index: 0; }

  /* Navbar */
  .navbar { position: sticky; top: 0; z-index: 50; background: rgba(5,5,8,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 58px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .navbar-left { display: flex; align-items: center; gap: 2rem; }
  .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.03em; text-decoration: none; color: var(--text); flex-shrink: 0; }
  .logo span { color: var(--neon-yellow); text-shadow: 0 0 10px rgba(245,255,0,0.5); }
  .nav-links { display: flex; align-items: center; gap: 0.25rem; }
  .nav-link { display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.75rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: var(--muted); text-decoration: none; transition: all 0.2s; white-space: nowrap; }
  .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-link.active { color: var(--text); background: rgba(255,255,255,0.07); }
  .nav-link.active .nav-dot { opacity: 1; }
  .nav-dot { width: 5px; height: 5px; border-radius: 50%; opacity: 0; transition: opacity 0.2s; }
  .navbar-right { display: flex; align-items: center; gap: 0.75rem; }
  .nav-avatar { width: 32px; height: 32px; background: var(--bg); border: 1.5px solid var(--neon-orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; box-shadow: 0 0 10px rgba(255,106,0,0.25); text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
  .nav-avatar:hover { transform: scale(1.1); box-shadow: 0 0 16px rgba(255,106,0,0.4); }
  .btn-logout { background: transparent; border: 1px solid #1e1e1e; color: var(--muted); padding: 0.35rem 0.8rem; border-radius: 7px; font-size: 0.8rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .btn-logout:hover { border-color: var(--neon-red); color: var(--neon-red); }

  /* Page */
  .page { position: relative; z-index: 10; max-width: 780px; margin: 0 auto; padding: 2.5rem 1rem; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
  .page-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; }
  .page-title span { color: var(--neon-yellow); text-shadow: 0 0 16px rgba(245,255,0,0.4); }

  .btn-primary {
    background: var(--neon-yellow); color: #000; border: none;
    padding: 0.65rem 1.2rem; border-radius: 10px; font-size: 0.88rem;
    font-weight: 800; font-family: inherit; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 0.4rem;
    box-shadow: 0 0 16px rgba(245,255,0,0.3); transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  .btn-primary:hover { box-shadow: 0 0 28px rgba(245,255,0,0.5); transform: translateY(-1px); }

  /* Tabs */
  .tabs { display: flex; gap: 0.25rem; margin-bottom: 1.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 0.3rem; animation: fadeUp 0.4s 0.05s cubic-bezier(0.16,1,0.3,1) both; }
  .tab { flex: 1; padding: 0.55rem 1rem; border-radius: 9px; border: none; background: transparent; color: var(--muted); font-size: 0.85rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: rgba(255,255,255,0.07); color: var(--text); }

  /* Bet Cards */
  .bets-list { display: flex; flex-direction: column; gap: 0.9rem; animation: fadeUp 0.4s 0.1s cubic-bezier(0.16,1,0.3,1) both; }

  .bet-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.3rem 1.5rem;
    text-decoration: none; color: var(--text);
    display: block; transition: all 0.22s; cursor: pointer;
    position: relative;
  }
  .bet-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); }

  .bet-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.8rem; }
  .bet-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; line-height: 1.3; }
  .bet-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

  .status-badge {
    font-size: 0.6rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 0.2rem 0.55rem; border-radius: 999px;
    white-space: nowrap; flex-shrink: 0;
  }
  .status-open     { background: rgba(0,255,136,0.12); color: var(--neon-green); border: 1px solid rgba(0,255,136,0.3); }
  .status-closed   { background: rgba(255,255,255,0.05); color: #444; border: 1px solid #1a1a1a; }
  .status-resolved { background: rgba(245,255,0,0.1); color: var(--neon-yellow); border: 1px solid rgba(245,255,0,0.3); }

  .bet-sides { display: flex; gap: 0.6rem; align-items: center; }
  .side-pill {
    flex: 1; padding: 0.45rem 0.8rem; border-radius: 8px;
    font-size: 0.78rem; font-weight: 700; text-align: center;
  }
  .side-a { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: var(--neon-blue); }
  .side-b { background: rgba(255,106,0,0.08); border: 1px solid rgba(255,106,0,0.2); color: var(--neon-orange); }
  .side-vs { color: var(--muted); font-size: 0.72rem; font-weight: 800; flex-shrink: 0; }

  .bet-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.8rem; font-size: 0.78rem; color: var(--muted); }
  .pot-amount { color: var(--neon-yellow); font-weight: 800; font-size: 0.85rem; }

  .empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
  .empty-state p { font-size: 0.9rem; }

  /* Bottom Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: rgba(5,5,8,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 0.5rem 0 calc(0.5rem + env(safe-area-inset-bottom)); display: none; grid-template-columns: repeat(4, 1fr); }
  .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; padding: 0.4rem; text-decoration: none; color: var(--muted); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.2s; cursor: pointer; border: none; background: none; font-family: inherit; }
  .bottom-nav-item .bn-icon { font-size: 1.3rem; }
  .bottom-nav-item.active { color: var(--neon-yellow); }
  .bottom-nav-item.active .bn-icon { filter: drop-shadow(0 0 6px rgba(245,255,0,0.5)); }

  @media (max-width: 640px) {
    .nav-links { display: none; }
    .bottom-nav { display: grid; }
    .page { padding-bottom: 5rem; }
    .page-header { flex-wrap: wrap; gap: 1rem; }
  }

  #loadingScreen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; font-size: 2rem; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="grid"></div>

<div id="loadingScreen">⚡</div>

<div id="mainPage" style="display:none">

  <nav class="navbar">
    <div class="navbar-left">
      <a class="logo" href="../dashboard/">Klaus<span>Maniac</span></a>
      <div class="nav-links">
        <a class="nav-link" href="../dashboard/">🏠 Home</a>
        <a class="nav-link" href="../profile/">👤 Profil</a>
        <a class="nav-link active" href="../bets/">
          🏆 Wettbüro <span class="nav-dot" style="background:var(--neon-blue)"></span>
        </a>
        <a class="nav-link" href="../highscores/">🎮 Highscores</a>
      </div>
    </div>
    <div class="navbar-right">
      <a class="nav-avatar" id="navAvatar" href="../profile/" title="Profil">🎮</a>
      <button class="btn-logout" onclick="logout()">Abmelden</button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <div style="font-size:0.75rem;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;color:var(--neon-blue);margin-bottom:0.4rem;text-shadow:0 0 10px rgba(0,212,255,0.4);">Kloins</div>
        <div class="page-title">Wett<span>büro</span> 🏆</div>
      </div>
      <a class="btn-primary" href="create/">+ Neue Wette</a>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('open')">Offen</button>
      <button class="tab" onclick="switchTab('closed')">Geschlossen</button>
      <button class="tab" onclick="switchTab('resolved')">Abgerechnet</button>
    </div>

    <div class="bets-list" id="betsList">
      <div class="empty-state">
        <span class="empty-icon">🏆</span>
        <p>Lädt Wetten…</p>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="../dashboard/"><span class="bn-icon">🏠</span>Home</a>
    <a class="bottom-nav-item" href="../profile/"><span class="bn-icon">👤</span>Profil</a>
    <a class="bottom-nav-item active" href="../bets/"><span class="bn-icon">🏆</span>Wetten</a>
    <a class="bottom-nav-item" href="../highscores/"><span class="bn-icon">🎮</span>Scores</a>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';
const SUPABASE_URL = 'https://tovruvmgqfsesyvlrxjr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0Ld58xAOFjwoMM42eL2Q6Q_4FmXUJda';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentTab = 'open';

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../login/'; return; }
  const { data: profile } = await sb.from('profiles').select('username, avatar').eq('id', session.user.id).single();
  if (profile) {
    if (profile.avatar) document.getElementById('navAvatar').textContent = profile.avatar;
  }
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainPage').style.display = '';
  await loadBets('open');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['open','closed','resolved'][i] === tab);
  });
  loadBets(tab);
}

async function loadBets(status) {
  const list = document.getElementById('betsList');
  list.innerHTML = '<div class="empty-state"><span class="empty-icon" style="animation:pulse 1s infinite">⚡</span><p>Lädt…</p></div>';

  const { data: bets, error } = await sb.from('bets').select('*, bet_participants(amount)').eq('status', status).order('created_at', { ascending: false });

  if (error || !bets || bets.length === 0) {
    const labels = { open: 'Noch keine offenen Wetten', closed: 'Keine geschlossenen Wetten', resolved: 'Noch keine abgerechneten Wetten' };
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">🏆</span><p>${labels[status]}</p></div>`;
    return;
  }

  list.innerHTML = bets.map(bet => {
    const pot = (bet.bet_participants || []).reduce((s, p) => s + p.amount, 0);
    const endsAt = new Date(bet.ends_at);
    const dateStr = endsAt.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const statusClass = { open: 'status-open', closed: 'status-closed', resolved: 'status-resolved' }[bet.status];
    const statusLabel = { open: 'Offen', closed: 'Geschlossen', resolved: 'Abgerechnet' }[bet.status];
    return `
      <a class="bet-card" href="detail/?id=${bet.id}">
        <div class="bet-card-top">
          <div>
            <div class="bet-title">${escHtml(bet.title)}</div>
            <div class="bet-meta">Endet: ${dateStr}</div>
          </div>
          <span class="status-badge ${statusClass}">${statusLabel}</span>
        </div>
        <div class="bet-sides">
          <div class="side-pill side-a">${escHtml(bet.side_a_label)}</div>
          <div class="side-vs">VS</div>
          <div class="side-pill side-b">${escHtml(bet.side_b_label)}</div>
        </div>
        <div class="bet-footer">
          <span>${(bet.bet_participants || []).length} Teilnehmer</span>
          <span class="pot-amount">💰 ${pot.toLocaleString('de-DE')} Kloins</span>
        </div>
      </a>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = '../login/';
}

init();
</script>
</body>
</html>
