<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil – KlausManiac</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --neon-yellow: #f5ff00;
    --neon-blue:   #00d4ff;
    --neon-orange: #ff6a00;
    --neon-green:  #00ff88;
    --neon-red:    #ff003c;
    --card: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #555;
    --input-bg: rgba(255,255,255,0.04);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    position: relative;
    overflow-x: hidden;
  }

  .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; opacity: 0.45; z-index: 0; }
  .blob-1 { width: 400px; height: 400px; top: -10%; left: -10%; background: var(--neon-blue);   animation: drift1 9s ease-in-out infinite alternate; }
  .blob-2 { width: 300px; height: 300px; bottom: -5%; right: -5%; background: var(--neon-orange); animation: drift2 11s ease-in-out infinite alternate; }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(30px,40px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-40px,-30px); } }

  .grid {
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 36px 36px; pointer-events: none; z-index: 0;
  }

  /* ── Navbar ── */
  .navbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(5,5,8,0.8); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem; height: 58px;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  }
  .navbar-left { display: flex; align-items: center; gap: 2rem; }

  .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.03em; text-decoration: none; color: var(--text); flex-shrink: 0; }
  .logo span { color: var(--neon-yellow); text-shadow: 0 0 10px rgba(245,255,0,0.5); }

  .nav-links { display: flex; align-items: center; gap: 0.25rem; }

  .nav-link {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.4rem 0.75rem; border-radius: 8px;
    font-size: 0.85rem; font-weight: 600; color: var(--muted);
    text-decoration: none; transition: all 0.2s; white-space: nowrap;
  }
  .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-link.active { color: var(--text); background: rgba(255,255,255,0.07); }
  .nav-link.active .nav-dot { opacity: 1; }
  .nav-dot { width: 5px; height: 5px; border-radius: 50%; opacity: 0; transition: opacity 0.2s; }
  .nav-link-soon { font-size: 0.58rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #333; background: rgba(255,255,255,0.05); border: 1px solid #1a1a1a; padding: 0.1rem 0.35rem; border-radius: 4px; }

  .navbar-right { display: flex; align-items: center; gap: 0.75rem; }
  .nav-avatar {
    width: 32px; height: 32px; background: var(--bg);
    border: 1.5px solid var(--neon-orange); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; cursor: pointer;
    box-shadow: 0 0 10px rgba(255,106,0,0.25); text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .nav-avatar:hover { transform: scale(1.1); box-shadow: 0 0 16px rgba(255,106,0,0.4); }

  .btn-logout {
    background: transparent; border: 1px solid #1e1e1e; color: var(--muted);
    padding: 0.35rem 0.8rem; border-radius: 7px; font-size: 0.8rem;
    font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--neon-red); color: var(--neon-red); }

  /* ── Page ── */
  .page { position: relative; z-index: 10; max-width: 600px; margin: 0 auto; padding: 2.5rem 1rem; }

  /* Avatar Section */
  .avatar-section {
    display: flex; align-items: center; gap: 1.5rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 1.8rem; margin-bottom: 1.2rem;
    animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

  .avatar-display {
    width: 90px; height: 90px; background: var(--bg);
    border: 2px solid var(--neon-orange); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; flex-shrink: 0; overflow: hidden;
    box-shadow: 0 0 20px rgba(255,106,0,0.4), 0 0 50px rgba(255,106,0,0.15);
    cursor: pointer; transition: transform 0.2s; position: relative;
  }
  #avatarImg { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
  .nav-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-display:hover { transform: scale(1.05); }
  .avatar-edit-hint {
    position: absolute; bottom: -4px; right: -4px;
    width: 26px; height: 26px; background: var(--neon-orange);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; color: #000;
  }

  .avatar-info h2 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.2rem; }
  .avatar-info p  { font-size: 0.82rem; color: var(--muted); }

  .emoji-picker {
    display: none;
    flex-direction: column; gap: 0;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 1.2rem;
    animation: fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }
  .emoji-picker.open { display: flex; }

  .picker-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .picker-tab {
    flex: 1; padding: 0.6rem; font-size: 0.8rem; font-weight: 700;
    font-family: inherit; background: none; border: none; color: var(--muted);
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em;
  }
  .picker-tab.active { color: var(--neon-yellow); background: rgba(245,255,0,0.05); border-bottom: 2px solid var(--neon-yellow); }

  .picker-tab-content { padding: 1rem; }
  .emoji-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }

  .emoji-option {
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; border-radius: 10px; cursor: pointer;
    background: rgba(255,255,255,0.03); border: 1px solid transparent; transition: all 0.15s;
  }
  .emoji-option:hover { background: rgba(255,255,255,0.1); border-color: var(--neon-yellow); transform: scale(1.1); }
  .emoji-option.selected { border-color: var(--neon-orange); background: rgba(255,106,0,0.1); box-shadow: 0 0 10px rgba(255,106,0,0.3); }

  .upload-area {
    border: 2px dashed var(--border); border-radius: 10px; padding: 1.5rem;
    text-align: center; cursor: pointer; transition: all 0.2s;
  }
  .upload-area:hover { border-color: var(--neon-blue); background: rgba(0,212,255,0.04); }
  .upload-area.drag-over { border-color: var(--neon-blue); background: rgba(0,212,255,0.08); }
  .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .upload-label { font-size: 0.85rem; color: var(--muted); }
  .upload-hint { font-size: 0.72rem; color: #333; margin-top: 0.3rem; }

  .upload-preview {
    display: none; align-items: center; gap: 0.75rem; margin-top: 0.75rem;
    background: rgba(255,255,255,0.03); border-radius: 8px; padding: 0.6rem;
  }
  .upload-preview.show { display: flex; }
  .upload-preview img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--neon-orange); }
  .upload-preview-info { flex: 1; min-width: 0; }
  .upload-preview-name { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upload-preview-size { font-size: 0.72rem; color: var(--muted); }

  .btn-upload {
    width: 100%; margin-top: 0.75rem; padding: 0.65rem;
    border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 800;
    font-family: inherit; cursor: pointer; background: var(--neon-blue); color: #000;
    box-shadow: 0 0 16px rgba(0,212,255,0.25); transition: all 0.2s;
  }
  .btn-upload:hover:not(:disabled) { box-shadow: 0 0 28px rgba(0,212,255,0.45); }
  .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; }

  .cropper-wrap {
    display: none; margin-top: 0.75rem;
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border); background: #000;
    max-height: 280px;
  }
  .cropper-wrap.show { display: block; }
  .cropper-wrap img { max-width: 100%; display: block; }
  .crop-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  .btn-crop-cancel {
    flex: 1; padding: 0.55rem; border: 1px solid var(--border); border-radius: 8px;
    background: none; color: var(--muted); font-family: inherit; font-size: 0.8rem;
    font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn-crop-cancel:hover { border-color: var(--neon-red); color: var(--neon-red); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.8rem; margin-bottom: 1.2rem; animation: fadeUp 0.4s 0.05s cubic-bezier(0.16,1,0.3,1) both; }

  .card-title {
    font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .form-group { margin-bottom: 1rem; }
  .form-group:last-child { margin-bottom: 0; }

  label { display: block; font-size: 0.75rem; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.4rem; }

  input[type="text"] {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 9px; padding: 0.7rem 0.9rem; color: var(--text);
    font-size: 0.95rem; font-family: inherit; transition: all 0.2s;
  }
  input[type="text"]::placeholder { color: #2a2a2a; }
  input[type="text"]:focus { outline: none; border-color: var(--neon-blue); background: rgba(0,212,255,0.05); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }

  .spruch-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
  .spruch-num {
    width: 24px; height: 24px; background: rgba(245,255,0,0.1);
    border: 1px solid rgba(245,255,0,0.2); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 800; color: var(--neon-yellow); flex-shrink: 0;
  }

  .alert { display: none; padding: 0.7rem 0.9rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; animation: fadeUp 0.2s ease; }
  .alert.error   { display: block; background: rgba(255,0,60,0.1);   border: 1px solid rgba(255,0,60,0.3);   color: #ff6b8a; }
  .alert.success { display: block; background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.25); color: var(--neon-green); text-shadow: 0 0 8px rgba(0,255,136,0.3); }

  .btn-save {
    width: 100%; padding: 0.9rem; border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 800; cursor: pointer; font-family: inherit;
    letter-spacing: 0.02em; text-transform: uppercase;
    background: var(--neon-green); color: #000;
    box-shadow: 0 0 20px rgba(0,255,136,0.3); transition: all 0.2s; margin-top: 0.5rem;
  }
  .btn-save:hover:not(:disabled) { box-shadow: 0 0 32px rgba(0,255,136,0.55); transform: translateY(-1px); }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── Bottom Nav (Mobile) ── */
  .bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(5,5,8,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 0.5rem 0 calc(0.5rem + env(safe-area-inset-bottom));
    display: none;
    grid-template-columns: repeat(4, 1fr);
  }

  .bottom-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    padding: 0.4rem;
    text-decoration: none;
    color: var(--muted);
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: color 0.2s;
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
  }
  .bottom-nav-item .bn-icon { font-size: 1.3rem; }
  .bottom-nav-item.active { color: var(--neon-yellow); }
  .bottom-nav-item.active .bn-icon { filter: drop-shadow(0 0 6px rgba(245,255,0,0.5)); }

  /* Navbar links verstecken auf Mobile, Bottom Nav zeigen */
  @media (max-width: 640px) {
    .nav-links { display: none; }
    .bottom-nav { display: grid; }
    .page { padding-bottom: 5rem; }
  }

  #loadingScreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; font-size: 2rem; animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Invitations */
  .invitations-section { margin-bottom: 1.2rem; animation: fadeUp 0.4s 0.04s cubic-bezier(0.16,1,0.3,1) both; }
  .invitation-card { background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.15); border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 0.7rem; }
  .invitation-card-from { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; }
  .invitation-card-from strong { color: var(--text); }
  .invitation-card-title { font-size: 0.9rem; font-weight: 800; margin-bottom: 0.7rem; }
  .invitation-actions { display: flex; gap: 0.5rem; }
  .btn-inv-go { flex: 2; padding: 0.5rem 0.8rem; border-radius: 8px; border: none; background: var(--neon-blue); color: #000; font-family: inherit; font-size: 0.8rem; font-weight: 800; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.3rem; transition: all 0.2s; }
  .btn-inv-go:hover { box-shadow: 0 0 14px rgba(0,212,255,0.4); }
  .btn-inv-decline { flex: 1; padding: 0.5rem 0.8rem; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-inv-decline:hover { border-color: var(--neon-red); color: var(--neon-red); }

  /* Navbar invite dot */
  .nav-invite-dot { width: 8px; height: 8px; background: var(--neon-red); border-radius: 50%; position: absolute; top: -1px; right: -1px; box-shadow: 0 0 6px rgba(255,0,60,0.6); }
  #navAvatar { position: relative; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="grid"></div>

<div id="loadingScreen">⚡</div>

<div id="mainPage" style="display:none">

  <nav class="navbar">
    <div class="navbar-left">
      <a class="logo" href="../dashboard/">Klaus<span>Maniac</span></a>
      <div class="nav-links">
        <a class="nav-link" href="../dashboard/">🏠 Home</a>
        <a class="nav-link active" href="../profile/">
          👤 Profil <span class="nav-dot" style="background:var(--neon-orange)"></span>
        </a>
        <a class="nav-link" href="../bets/">🏆 Wettbüro</a>
        <a class="nav-link" href="../highscores/">🎮 Highscores</a>
      </div>
    </div>
    <div class="navbar-right">
      <a class="nav-avatar" id="navAvatar" href="../profile/" title="Profil">🎮</a>
      <button class="btn-logout" onclick="logout()">Abmelden</button>
    </div>
  </nav>

  <div class="page">

    <div class="avatar-section">
      <div class="avatar-display" id="avatarDisplay" onclick="toggleEmojiPicker()">
        <img id="avatarImg" alt="Avatar">
        <span id="avatarEmoji">🎮</span>
        <div class="avatar-edit-hint">✏️</div>
      </div>
      <div class="avatar-info">
        <h2 id="displayNameHeader">Dein Profil</h2>
        <p id="emailDisplay"></p>
        <p style="font-size:0.78rem;color:#333;margin-top:0.3rem;">Klick auf den Avatar zum Ändern</p>
      </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <div class="emoji-picker" id="emojiPicker">
      <div class="picker-tabs">
        <button class="picker-tab active" onclick="switchTab('emoji')">😄 Emoji</button>
        <button class="picker-tab" onclick="switchTab('image')">📷 Bild hochladen</button>
      </div>
      <div class="picker-tab-content" id="tabEmoji">
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
      <div class="picker-tab-content" id="tabImage" style="display:none">
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon">📁</div>
          <div class="upload-label">Bild auswählen oder hierher ziehen</div>
          <div class="upload-hint">JPG, PNG, GIF, WebP · max. 5 MB</div>
        </div>
        <div class="cropper-wrap" id="cropperWrap">
          <img id="cropperImg" alt="">
        </div>
        <div class="crop-actions" id="cropActions" style="display:none">
          <button class="btn-crop-cancel" onclick="resetUpload()">Abbrechen</button>
          <button class="btn-upload" id="btnUpload" onclick="uploadImage()" style="margin-top:0">Zuschneiden & speichern →</button>
        </div>
      </div>
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="invitations-section" id="invitationsSection" style="display:none">
      <div class="card-title" id="invitationsTitle" style="margin-bottom:0.8rem">📬 Einladungen</div>
      <div id="invitationsList"></div>
    </div>

    <div class="card">
      <div class="card-title">👤 Anzeigename</div>
      <div class="form-group">
        <input type="text" id="fUsername" placeholder="Wie sollen dich andere nennen?" maxlength="30">
      </div>
    </div>

    <div class="card">
      <div class="card-title">⚡ Siegessprüche</div>
      <div class="spruch-row"><div class="spruch-num">1</div><input type="text" id="s1" placeholder="z. B. Zu langsam, Brudi!" maxlength="80"></div>
      <div class="spruch-row"><div class="spruch-num">2</div><input type="text" id="s2" placeholder="z. B. Kein Mercy!" maxlength="80"></div>
      <div class="spruch-row"><div class="spruch-num">3</div><input type="text" id="s3" placeholder="z. B. Gg ez" maxlength="80"></div>
      <div class="spruch-row"><div class="spruch-num">4</div><input type="text" id="s4" placeholder="z. B. Next!" maxlength="80"></div>
      <div class="spruch-row"><div class="spruch-num">5</div><input type="text" id="s5" placeholder="z. B. War nix heute!" maxlength="80"></div>
    </div>

    <button class="btn-save" id="btnSave" onclick="saveProfile()">Profil speichern →</button>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="bottom-nav-item" href="../dashboard/"><span class="bn-icon">🏠</span>Home</a>
    <a class="bottom-nav-item active" href="../profile/"><span class="bn-icon">👤</span>Profil</a>
    <a class="bottom-nav-item" href="../bets/"><span class="bn-icon">🏆</span>Wetten</a>
    <a class="bottom-nav-item" href="../highscores/"><span class="bn-icon">🎮</span>Scores</a>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';
const SUPABASE_URL = 'https://tovruvmgqfsesyvlrxjr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0Ld58xAOFjwoMM42eL2Q6Q_4FmXUJda';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const EMOJIS = ['🎮','👾','🕹️','🏆','🔥','⚡','💀','👑','🦁','🐺','🦊','🐉','🦅','🤖','👻','💥','🎯','🚀','🌪️','❄️','🌊','☄️','🎲','🃏','🥷','🦸','🤠','😈','🤡','👽'];

let currentUser = null;
let selectedEmoji = '🎮';
let avatarImageUrl = null;
let cropperInstance = null;

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '../login/'; return; }
  currentUser = session.user;
  document.getElementById('emailDisplay').textContent = currentUser.email;
  buildEmojiPicker();
  setupFileInput();
  await loadProfile();
  await loadInvitations();
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainPage').style.display = '';
}

async function loadInvitations() {
  const { data: invitations } = await sb.from('bet_invitations')
    .select('*, bets(id, title, side_a_label, side_b_label), profiles!invited_by(username, avatar, avatar_url)')
    .eq('invited_user_id', currentUser.id)
    .eq('status', 'pending')
    .order('created_at', { ascending: false });

  const section = document.getElementById('invitationsSection');
  if (!invitations || invitations.length === 0) { section.style.display = 'none'; return; }

  document.getElementById('invitationsTitle').textContent = `📬 Einladungen (${invitations.length})`;
  document.getElementById('invitationsList').innerHTML = invitations.map(inv => {
    const from = inv.profiles || {};
    const bet = inv.bets || {};
    const avHtml = from.avatar_url
      ? `<img src="${esc(from.avatar_url)}" style="width:18px;height:18px;border-radius:50%;object-fit:cover;vertical-align:middle" alt=""> `
      : `${esc(from.avatar || '🎮')} `;
    return `<div class="invitation-card" id="inv-${inv.id}">
      <div class="invitation-card-from">${avHtml}<strong>${esc(from.username || 'Unbekannt')}</strong> hat dich eingeladen:</div>
      <div class="invitation-card-title">"${esc(bet.title || 'Unbekannte Wette')}"</div>
      <div class="invitation-actions">
        <a class="btn-inv-go" href="../bets/detail/?id=${esc(bet.id)}">Zur Wette →</a>
        <button class="btn-inv-decline" onclick="declineInvitation('${inv.id}')">Ablehnen</button>
      </div>
    </div>`;
  }).join('');

  section.style.display = '';

  // Navbar dot if pending invitations exist
  const navAvatar = document.getElementById('navAvatar');
  if (!navAvatar.querySelector('.nav-invite-dot')) {
    const dot = document.createElement('span');
    dot.className = 'nav-invite-dot';
    navAvatar.appendChild(dot);
  }
}

async function declineInvitation(invId) {
  await sb.from('bet_invitations').update({ status: 'declined' }).eq('id', invId);
  document.getElementById('inv-' + invId)?.remove();
  const remaining = document.querySelectorAll('.invitation-card').length;
  if (remaining === 0) {
    document.getElementById('invitationsSection').style.display = 'none';
    document.getElementById('navAvatar').querySelector('.nav-invite-dot')?.remove();
  } else {
    document.getElementById('invitationsTitle').textContent = `📬 Einladungen (${remaining})`;
  }
}

function buildEmojiPicker() {
  const grid = document.getElementById('emojiGrid');
  EMOJIS.forEach(e => {
    const el = document.createElement('div');
    el.className = 'emoji-option' + (e === selectedEmoji ? ' selected' : '');
    el.textContent = e;
    el.onclick = () => selectEmoji(e);
    grid.appendChild(el);
  });
}

function switchTab(tab) {
  document.getElementById('tabEmoji').style.display = tab === 'emoji' ? '' : 'none';
  document.getElementById('tabImage').style.display = tab === 'image' ? '' : 'none';
  document.querySelectorAll('.picker-tab').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0) === (tab === 'emoji'));
  });
}

function toggleEmojiPicker() {
  document.getElementById('emojiPicker').classList.toggle('open');
}

function selectEmoji(emoji) {
  selectedEmoji = emoji;
  avatarImageUrl = null;
  document.getElementById('avatarEmoji').textContent = emoji;
  document.getElementById('avatarEmoji').style.display = '';
  document.getElementById('avatarImg').style.display = 'none';
  const nav = document.getElementById('navAvatar');
  nav.textContent = emoji;
  document.querySelectorAll('.emoji-option').forEach(el => el.classList.toggle('selected', el.textContent === emoji));
  document.getElementById('emojiPicker').classList.remove('open');
}

function setAvatarImage(url) {
  avatarImageUrl = url;
  const img = document.getElementById('avatarImg');
  img.src = url;
  img.style.display = 'block';
  document.getElementById('avatarEmoji').style.display = 'none';
  const nav = document.getElementById('navAvatar');
  nav.textContent = '';
  const navImg = document.createElement('img');
  navImg.src = url;
  nav.appendChild(navImg);
}

function setupFileInput() {
  const input = document.getElementById('fileInput');
  const area = document.getElementById('uploadArea');

  input.addEventListener('change', () => handleFile(input.files[0]));

  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
  area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
  area.addEventListener('drop', e => {
    e.preventDefault();
    area.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });
}

function handleFile(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) { showAlert('Nur Bilddateien erlaubt.', 'error'); return; }
  if (file.size > 5 * 1024 * 1024) { showAlert('Bild zu groß – max. 5 MB erlaubt.', 'error'); return; }

  const reader = new FileReader();
  reader.onload = e => {
    const cropperImg = document.getElementById('cropperImg');
    cropperImg.src = e.target.result;

    document.getElementById('cropperWrap').classList.add('show');
    document.getElementById('cropActions').style.display = 'flex';

    if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
    cropperInstance = new Cropper(cropperImg, {
      aspectRatio: 1,
      viewMode: 1,
      dragMode: 'move',
      autoCropArea: 0.9,
      guides: false,
      center: true,
      highlight: false,
      background: false,
      cropBoxMovable: true,
      cropBoxResizable: true,
    });
  };
  reader.readAsDataURL(file);
}

function resetUpload() {
  if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
  document.getElementById('cropperWrap').classList.remove('show');
  document.getElementById('cropActions').style.display = 'none';
  document.getElementById('fileInput').value = '';
}

async function uploadImage() {
  if (!cropperInstance) return;
  const btn = document.getElementById('btnUpload');
  btn.disabled = true;
  btn.textContent = 'Lädt hoch…';

  const canvas = cropperInstance.getCroppedCanvas({ width: 400, height: 400 });
  const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));

  const path = `${currentUser.id}/avatar.jpg`;
  const { error: upErr } = await sb.storage.from('avatars').upload(path, blob, { upsert: true, contentType: 'image/jpeg' });
  if (upErr) {
    showAlert('Upload fehlgeschlagen: ' + upErr.message, 'error');
    btn.disabled = false; btn.textContent = 'Zuschneiden & speichern →';
    return;
  }

  const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(path);
  const urlWithBust = publicUrl + '?t=' + Date.now();

  const { error: dbErr } = await sb.from('profiles').upsert({ id: currentUser.id, avatar_url: urlWithBust });
  if (dbErr) { showAlert('Fehler beim Speichern: ' + dbErr.message, 'error'); }
  else {
    setAvatarImage(urlWithBust);
    showAlert('✓ Bild gespeichert!', 'success');
    resetUpload();
    document.getElementById('emojiPicker').classList.remove('open');
  }

  btn.disabled = false; btn.textContent = 'Zuschneiden & speichern →';
}

async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if (data) {
    document.getElementById('fUsername').value = data.username || '';
    document.getElementById('s1').value = data.siegesspruch_1 || '';
    document.getElementById('s2').value = data.siegesspruch_2 || '';
    document.getElementById('s3').value = data.siegesspruch_3 || '';
    document.getElementById('s4').value = data.siegesspruch_4 || '';
    document.getElementById('s5').value = data.siegesspruch_5 || '';
    if (data.avatar_url) {
      setAvatarImage(data.avatar_url);
    } else if (data.avatar) {
      selectEmoji(data.avatar);
    }
    updateHeader(data.username);
  }
}

function updateHeader(name) {
  document.getElementById('displayNameHeader').textContent = name || 'Dein Profil';
}

async function saveProfile() {
  const username = document.getElementById('fUsername').value.trim();
  if (!username) { showAlert('Bitte gib einen Anzeigenamen ein.', 'error'); return; }
  const payload = {
    id: currentUser.id, username,
    ...(avatarImageUrl ? {} : { avatar: selectedEmoji, avatar_url: null }),
    siegesspruch_1: document.getElementById('s1').value.trim() || null,
    siegesspruch_2: document.getElementById('s2').value.trim() || null,
    siegesspruch_3: document.getElementById('s3').value.trim() || null,
    siegesspruch_4: document.getElementById('s4').value.trim() || null,
    siegesspruch_5: document.getElementById('s5').value.trim() || null,
  };
  setBtnLoading(true);
  const { error } = await sb.from('profiles').upsert(payload);
  setBtnLoading(false);
  if (error) showAlert('Fehler: ' + error.message, 'error');
  else { showAlert('✓ Profil gespeichert!', 'success'); updateHeader(username); }
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = '../login/';
}

function showAlert(msg, type) {
  const el = document.getElementById('alertBox');
  el.textContent = msg; el.className = 'alert ' + type;
  setTimeout(() => { el.className = 'alert'; }, 4000);
}

function setBtnLoading(loading) {
  const btn = document.getElementById('btnSave');
  btn.disabled = loading;
  btn.textContent = loading ? 'Speichert…' : 'Profil speichern →';
}

init();
</script>
</body>
</html>
