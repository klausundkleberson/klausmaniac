<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wette – KlausManiac</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050508;
    --neon-yellow: #f5ff00;
    --neon-blue:   #00d4ff;
    --neon-orange: #ff6a00;
    --neon-green:  #00ff88;
    --neon-red:    #ff003c;
    --card: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #555;
    --input-bg: rgba(255,255,255,0.04);
  }

  body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); position: relative; overflow-x: hidden; }

  .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; opacity: 0.45; z-index: 0; }
  .blob-1 { width: 500px; height: 500px; top: -15%; left: -10%; background: var(--neon-blue); animation: drift1 9s ease-in-out infinite alternate; }
  .blob-2 { width: 350px; height: 350px; bottom: -5%; right: -5%; background: var(--neon-orange); animation: drift2 11s ease-in-out infinite alternate; }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(30px,40px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-40px,-30px); } }

  .grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 36px 36px; pointer-events: none; z-index: 0; }

  /* Navbar */
  .navbar { position: sticky; top: 0; z-index: 50; background: rgba(5,5,8,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 58px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .navbar-left { display: flex; align-items: center; gap: 2rem; }
  .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.03em; text-decoration: none; color: var(--text); flex-shrink: 0; }
  .logo span { color: var(--neon-yellow); text-shadow: 0 0 10px rgba(245,255,0,0.5); }
  .nav-links { display: flex; align-items: center; gap: 0.25rem; }
  .nav-link { display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.75rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: var(--muted); text-decoration: none; transition: all 0.2s; white-space: nowrap; }
  .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-link.active { color: var(--text); background: rgba(255,255,255,0.07); }
  .nav-link.active .nav-dot { opacity: 1; }
  .nav-dot { width: 5px; height: 5px; border-radius: 50%; opacity: 0; transition: opacity 0.2s; }
  .navbar-right { display: flex; align-items: center; gap: 0.75rem; }
  .nav-avatar { width: 32px; height: 32px; background: var(--bg); border: 1.5px solid var(--neon-orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; box-shadow: 0 0 10px rgba(255,106,0,0.25); text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
  .nav-avatar:hover { transform: scale(1.1); box-shadow: 0 0 16px rgba(255,106,0,0.4); }
  .nav-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .btn-logout { background: transparent; border: 1px solid #1e1e1e; color: var(--muted); padding: 0.35rem 0.8rem; border-radius: 7px; font-size: 0.8rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .btn-logout:hover { border-color: var(--neon-red); color: var(--neon-red); }

  /* Page */
  .page { position: relative; z-index: 10; max-width: 780px; margin: 0 auto; padding: 2.5rem 1rem; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

  .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--muted); text-decoration: none; font-size: 0.82rem; font-weight: 600; margin-bottom: 1.5rem; transition: color 0.2s; }
  .back-link:hover { color: var(--text); }

  /* Bet header */
  .bet-header { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem 1.8rem; margin-bottom: 1.2rem; animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
  .bet-header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  .bet-header-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; }
  .bet-header-desc { font-size: 0.88rem; color: var(--muted); margin-top: 0.5rem; line-height: 1.5; }
  .bet-meta-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 0.8rem; font-size: 0.8rem; color: var(--muted); }
  .bet-meta-item strong { color: var(--text); }

  .status-badge { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.2rem 0.55rem; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
  .status-open     { background: rgba(0,255,136,0.12); color: var(--neon-green); border: 1px solid rgba(0,255,136,0.3); }
  .status-closed   { background: rgba(255,255,255,0.05); color: #444; border: 1px solid #1a1a1a; }
  .status-resolved { background: rgba(245,255,0,0.1); color: var(--neon-yellow); border: 1px solid rgba(245,255,0,0.3); }

  /* ── Winner Hero ── */
  .winner-hero {
    position: relative; overflow: hidden;
    background: linear-gradient(160deg, rgba(0,255,136,0.07) 0%, rgba(245,255,0,0.04) 100%);
    border: 1px solid rgba(0,255,136,0.25);
    border-radius: 20px; padding: 2rem 1.5rem 1.6rem;
    margin-bottom: 1.2rem; text-align: center;
    animation: fadeUp 0.4s 0.05s cubic-bezier(0.16,1,0.3,1) both;
  }
  .winner-hero::before {
    content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 200px;
    background: radial-gradient(ellipse, rgba(0,255,136,0.14) 0%, transparent 70%);
    pointer-events: none;
  }
  .winner-hero-eyebrow {
    font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--neon-green);
    text-shadow: 0 0 10px rgba(0,255,136,0.5);
    margin-bottom: 1.4rem;
  }
  .winner-hero-users { display: flex; gap: 2.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .winner-hero-user { display: flex; flex-direction: column; align-items: center; gap: 0.35rem; }
  .winner-hero-avatar {
    width: 68px; height: 68px; border-radius: 50%;
    border: 2.5px solid var(--neon-green);
    box-shadow: 0 0 22px rgba(0,255,136,0.4), 0 0 60px rgba(0,255,136,0.1);
    background: var(--bg); display: flex; align-items: center;
    justify-content: center; font-size: 2rem; overflow: hidden;
  }
  .winner-hero-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .winner-hero-name { font-size: 1rem; font-weight: 800; letter-spacing: -0.01em; }
  .winner-hero-me { color: var(--neon-green); font-size: 0.68rem; font-weight: 700; }
  .winner-hero-gain-label { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 0.1rem; }
  .winner-hero-gain { font-size: 1.4rem; font-weight: 800; color: var(--neon-yellow); text-shadow: 0 0 18px rgba(245,255,0,0.5); letter-spacing: -0.02em; }
  .winner-hero-gain-zero { font-size: 0.8rem; font-weight: 700; color: var(--muted); }
  .winner-hero-stake { font-size: 0.82rem; color: #888; }
  .winner-hero-footer { font-size: 0.75rem; color: var(--muted); }
  .winner-hero-spruch { font-size: 1rem; font-weight: 700; font-style: italic; color: var(--neon-yellow); text-shadow: 0 0 14px rgba(245,255,0,0.4); text-align: center; margin-bottom: 0.8rem; padding: 0 0.5rem; }
  .winner-hero-team { font-weight: 600; }

  /* Draw hero */
  .draw-hero {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 1.5rem; margin-bottom: 1.2rem;
    text-align: center; animation: fadeUp 0.4s 0.05s cubic-bezier(0.16,1,0.3,1) both;
  }
  .draw-hero-icon { font-size: 2.2rem; margin-bottom: 0.4rem; }
  .draw-hero-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .draw-hero-text { font-size: 1rem; font-weight: 800; margin-top: 0.3rem; }
  .draw-hero-desc { font-size: 0.82rem; color: var(--muted); margin-top: 0.4rem; font-style: italic; }

  /* Pot */
  .pot-bar { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.2rem 1.5rem; margin-bottom: 1.2rem; animation: fadeUp 0.4s 0.05s cubic-bezier(0.16,1,0.3,1) both; display: flex; align-items: center; justify-content: center; gap: 2rem; flex-wrap: wrap; }
  .pot-total { text-align: center; }
  .pot-total-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.2rem; }
  .pot-total-val { font-size: 1.8rem; font-weight: 800; color: var(--neon-yellow); text-shadow: 0 0 20px rgba(245,255,0,0.4); }
  .pot-sides { display: flex; gap: 1rem; }
  .pot-side { text-align: center; }
  .pot-side-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.2rem; }
  .pot-side-val { font-size: 1.1rem; font-weight: 800; }
  .side-a-color { color: var(--neon-blue); }
  .side-b-color { color: var(--neon-orange); }

  /* Sides */
  .sides-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.2rem; animation: fadeUp 0.4s 0.1s cubic-bezier(0.16,1,0.3,1) both; }

  .side-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.3rem; transition: opacity 0.3s; }
  .side-card-a { border-color: rgba(0,212,255,0.15); }
  .side-card-b { border-color: rgba(255,106,0,0.15); }
  .side-card-won { border-color: rgba(0,255,136,0.3) !important; background: rgba(0,255,136,0.04) !important; }
  .side-card-lost { opacity: 0.35; }

  .side-card-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }
  .side-card-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .side-card-dot-a { background: var(--neon-blue); box-shadow: 0 0 8px rgba(0,212,255,0.5); }
  .side-card-dot-b { background: var(--neon-orange); box-shadow: 0 0 8px rgba(255,106,0,0.5); }
  .side-card-label { font-size: 0.88rem; font-weight: 800; }
  .side-card-a .side-card-label { color: var(--neon-blue); }
  .side-card-b .side-card-label { color: var(--neon-orange); }
  .side-card-won .side-card-label { color: var(--neon-green) !important; }

  .participant-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; gap: 0.5rem; }
  .participant-row:last-child { border-bottom: none; }
  .participant-name { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 0; }
  .participant-avatar { font-size: 1rem; flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .participant-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .participant-username { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .participant-stake { font-size: 0.72rem; color: var(--muted); }
  .participant-right { text-align: right; white-space: nowrap; }
  .participant-amount { font-weight: 800; font-size: 0.85rem; }
  .amount-a { color: var(--neon-blue); }
  .amount-b { color: var(--neon-orange); }
  .participant-payout { font-size: 0.72rem; color: var(--neon-green); font-weight: 700; }
  .no-participants { font-size: 0.82rem; color: var(--muted); text-align: center; padding: 1rem 0; }

  /* Join card */
  .join-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.2rem; animation: fadeUp 0.4s 0.15s cubic-bezier(0.16,1,0.3,1) both; }
  .section-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .side-selector { display: flex; gap: 0.7rem; margin-bottom: 1rem; }
  .side-btn { flex: 1; padding: 0.75rem; border-radius: 12px; border: 2px solid transparent; background: rgba(255,255,255,0.03); color: var(--muted); font-family: inherit; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; }
  .side-btn-a.selected { background: rgba(0,212,255,0.1); border-color: var(--neon-blue); color: var(--neon-blue); }
  .side-btn-b.selected { background: rgba(255,106,0,0.1); border-color: var(--neon-orange); color: var(--neon-orange); }
  .side-btn:hover { background: rgba(255,255,255,0.05); }

  label { display: block; font-size: 0.75rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.4rem; }
  input[type="text"] { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 9px; padding: 0.7rem 0.9rem; color: var(--text); font-size: 0.95rem; font-family: inherit; transition: all 0.2s; }
  input::placeholder { color: #2a2a2a; }
  input:focus { outline: none; border-color: var(--neon-blue); background: rgba(0,212,255,0.05); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }

  .btn-join { width: 100%; padding: 0.85rem; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 800; cursor: pointer; font-family: inherit; letter-spacing: 0.02em; text-transform: uppercase; background: var(--neon-blue); color: #000; box-shadow: 0 0 16px rgba(0,212,255,0.3); transition: all 0.2s; }
  .btn-join:hover:not(:disabled) { box-shadow: 0 0 28px rgba(0,212,255,0.5); transform: translateY(-1px); }
  .btn-join:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Result entry card (open/closed) */
  .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.2rem; animation: fadeUp 0.4s 0.18s cubic-bezier(0.16,1,0.3,1) both; }

  .result-buttons { display: flex; gap: 0.7rem; margin-bottom: 1rem; }
  .result-btn { flex: 1; padding: 0.7rem; border-radius: 10px; border: 2px solid transparent; background: rgba(255,255,255,0.03); color: var(--muted); font-family: inherit; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; }
  .result-btn.sel-a { background: rgba(0,212,255,0.1); border-color: var(--neon-blue); color: var(--neon-blue); }
  .result-btn.sel-b { background: rgba(255,106,0,0.1); border-color: var(--neon-orange); color: var(--neon-orange); }
  .result-btn.sel-draw { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.3); color: var(--text); }
  .result-btn:hover { background: rgba(255,255,255,0.05); }

  textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 9px; padding: 0.7rem 0.9rem; color: var(--text); font-size: 0.9rem; font-family: inherit; transition: all 0.2s; resize: vertical; min-height: 70px; }
  textarea:focus { outline: none; border-color: var(--neon-blue); background: rgba(0,212,255,0.05); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
  textarea::placeholder { color: #2a2a2a; }

  .btn-resolve { width: 100%; padding: 0.85rem; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 800; cursor: pointer; font-family: inherit; letter-spacing: 0.02em; text-transform: uppercase; background: var(--neon-green); color: #000; box-shadow: 0 0 16px rgba(0,255,136,0.3); transition: all 0.2s; margin-top: 0.8rem; }
  .btn-resolve:hover:not(:disabled) { box-shadow: 0 0 28px rgba(0,255,136,0.5); transform: translateY(-1px); }
  .btn-resolve:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Dezente "Ergebnis korrigieren" Sektion (resolved) */
  .change-result-wrap { margin-bottom: 1.2rem; animation: fadeUp 0.4s 0.2s cubic-bezier(0.16,1,0.3,1) both; }
  .btn-change-result {
    background: none; border: none; color: var(--muted);
    font-family: inherit; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; padding: 0; transition: color 0.2s;
    display: flex; align-items: center; gap: 0.3rem;
  }
  .btn-change-result:hover { color: #777; }
  .change-result-form {
    margin-top: 1rem; background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.2rem;
  }

  /* History */
  .history-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.2rem; animation: fadeUp 0.4s 0.22s cubic-bezier(0.16,1,0.3,1) both; }
  .history-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .history-toggle-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .history-toggle-icon { color: var(--muted); font-size: 0.9rem; transition: transform 0.2s; }
  .history-toggle-icon.open { transform: rotate(180deg); }
  .history-entries { margin-top: 1rem; display: none; }
  .history-entries.open { display: block; }
  .history-entry { padding: 0.8rem 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .history-entry:last-child { border-bottom: none; }
  .history-entry-header { display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
  .history-entry-by { font-weight: 700; }
  .history-entry-time { color: var(--muted); font-size: 0.75rem; }
  .history-entry-change { color: var(--muted); }
  .history-entry-change strong { color: var(--text); }

  .alert { display: none; padding: 0.7rem 0.9rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; }
  .alert.error   { display: block; background: rgba(255,0,60,0.1); border: 1px solid rgba(255,0,60,0.3); color: #ff6b8a; }
  .alert.success { display: block; background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.25); color: var(--neon-green); }

  /* Bottom Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: rgba(5,5,8,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 0.5rem 0 calc(0.5rem + env(safe-area-inset-bottom)); display: none; grid-template-columns: repeat(4, 1fr); }
  .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; padding: 0.4rem; text-decoration: none; color: var(--muted); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.2s; }
  .bottom-nav-item .bn-icon { font-size: 1.3rem; }
  .bottom-nav-item.active { color: var(--neon-yellow); }

  @media (max-width: 640px) {
    .nav-links { display: none; }
    .bottom-nav { display: grid; }
    .page { padding-bottom: 5rem; }
    .sides-grid { grid-template-columns: 1fr; }
    .result-buttons { flex-direction: column; }
    .pot-bar { gap: 1rem; }
    .winner-hero-users { gap: 1.5rem; }
  }

  #loadingScreen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; font-size: 2rem; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Testgegner-Card */
  .bot-card { background: rgba(245,255,0,0.03); border: 1px dashed rgba(245,255,0,0.2); border-radius: 16px; padding: 1.2rem 1.5rem; margin-bottom: 1.2rem; animation: fadeUp 0.4s 0.2s cubic-bezier(0.16,1,0.3,1) both; }
  .bot-card-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(245,255,0,0.5); }
  .bot-input-row { display: flex; gap: 0.6rem; align-items: flex-end; }
  .bot-input-row input { flex: 1; }
  .btn-bot { padding: 0.75rem 1.2rem; border: none; border-radius: 10px; font-size: 0.85rem; font-weight: 800; cursor: pointer; font-family: inherit; background: rgba(245,255,0,0.12); color: var(--neon-yellow); border: 1px solid rgba(245,255,0,0.25); transition: all 0.2s; white-space: nowrap; }
  .btn-bot:hover:not(:disabled) { background: rgba(245,255,0,0.2); }
  .btn-bot:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="grid"></div>

<div id="loadingScreen">⚡</div>

<div id="mainPage" style="display:none">

  <nav class="navbar">
    <div class="navbar-left">

function parseStake(p) {
  if (!p.stake_description) return { isKloins: true, icon: '💰', label: p.amount.toLocaleString('de-DE') + ' Kloins' };
  const sep = p.stake_description.indexOf(':');
  if (sep === -1) return { isKloins: false, icon: '📝', label: p.stake_description };
  const typeId = p.stake_description.slice(0, sep);
  const desc   = p.stake_description.slice(sep + 1);
  const t = STAKE_TYPES.find(x => x.id === typeId);
  return { isKloins: false, icon: t ? t.icon : '📝', label: desc };
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDate(d) {
  return new Date(d).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function fmtEndsAt(d) {
  const date = new Date(d);
  if (date.getFullYear() >= 2090) return 'Kein Limit';
  return fmtDate(d);
}

// Calculates expected payouts for kloins participants
function calcPayouts() {
  const kp = participants.filter(p => !p.stake_description);
  const total = kp.reduce((s, p) => s + p.amount, 0);
  const map = {};
  if (!bet.winner_side) return map;
  if (bet.winner_side === 'draw') {
    kp.forEach(p => { map[p.user_id] = { payout: p.amount, profit: 0 }; });
    return map;
  }
  const wsum = kp.filter(p => p.side === bet.winner_side).reduce((s, p) => s + p.amount, 0);
  const loot = total - wsum;
  kp.forEach(p => {
    if (p.side === bet.winner_side && wsum > 0) {
      const payout = p.amount + Math.floor((p.amount / wsum) * loot);
      map[p.user_id] = { payout, profit: payout - p.amount };
    } else {
      map[p.user_id] = { payout: 0, profit: -p.amount };
    }
  });
  return map;
}

  const showMeta = bet.status !== 'resolved';
  document.getElementById('betHeader').innerHTML = `
    <div class="bet-header-top">
      <div class="bet-header-title">${esc(bet.title)}</div>
      <span class="status-badge ${statusClass}">${statusLabel}</span>
    </div>
    ${bet.description ? `<div class="bet-header-desc">${esc(bet.description)}</div>` : ''}
    ${showMeta ? `<div class="bet-meta-row">
      <div class="bet-meta-item">Endet: <strong>${fmtEndsAt(bet.ends_at)}</strong></div>
    </div>` : ''}`;
}

function renderWinnerHero() {
  const el = document.getElementById('winnerHero');
  if (bet.status !== 'resolved' || !bet.winner_side) { el.innerHTML = ''; return; }

  if (bet.winner_side === 'draw') {
    el.innerHTML = `<div class="draw-hero">
      <div class="draw-hero-icon">🤝</div>
      <div class="draw-hero-label">Ergebnis</div>
      <div class="draw-hero-text">Unentschieden — jeder bekommt seinen Einsatz zurück</div>
      ${bet.result_description ? `<div class="draw-hero-desc">"${esc(bet.result_description)}"</div>` : ''}
    </div>`;
    return;
  }

  const payouts = calcPayouts();
  const winners = participants.filter(p => p.side === bet.winner_side);
  const losers  = participants.filter(p => p.side !== bet.winner_side);
  const teamLabel = bet.winner_side === 'A' ? bet.side_a_label : bet.side_b_label;

  // Loser non-Kloins stakes (each winner gets all of these)
  const loserNonKloinsStakes = losers.filter(p => p.stake_description).map(p => parseStake(p));

  const usersHtml = winners.map(p => {
    const prof = profiles[p.user_id] || {};
    const stake = parseStake(p);
    const pd = payouts[p.user_id];
    const isMe = p.user_id === currentUser.id;

    const avInner = prof.avatar_url
      ? `<img src="${esc(prof.avatar_url)}" alt="">`
      : esc(prof.avatar || '🎮');

    let gainHtml = '';
    if (stake.isKloins && pd) {
      if (pd.profit > 0) {
        gainHtml = `<div class="winner-hero-gain-label">Gewinn</div><div class="winner-hero-gain">+${pd.profit.toLocaleString('de-DE')} Kloins</div>`;
      } else {
        gainHtml = `<div class="winner-hero-gain-zero">Einsatz zurück</div>`;
      }
    } else {
      // Show what the losers wagered — each winner collects all loser stakes
      if (loserNonKloinsStakes.length > 0) {
        gainHtml = loserNonKloinsStakes.map(s =>
          `<div class="winner-hero-stake">${s.icon} ${esc(s.label)}</div>`
        ).join('');
      } else {
        gainHtml = `<div class="winner-hero-stake">${stake.icon} ${esc(stake.label)}</div>`;
      }
    }

    return `<div class="winner-hero-user">
      <div class="winner-hero-avatar">${avInner}</div>
      <div class="winner-hero-name">${esc(prof.username || 'User')}${isMe ? ' <span class="winner-hero-me">(du)</span>' : ''}</div>
      ${gainHtml}
    </div>`;
  }).join('');

  // Pick a random Siegesspruch from one of the winners
  const winnerSprueche = winners.flatMap(p => {
    const prof = profiles[p.user_id] || {};
    return [prof.siegesspruch_1, prof.siegesspruch_2, prof.siegesspruch_3, prof.siegesspruch_4, prof.siegesspruch_5].filter(Boolean);
  });
  const randomSpruch = winnerSprueche.length > 0
    ? winnerSprueche[Math.floor(Math.random() * winnerSprueche.length)]
    : null;

  el.innerHTML = `<div class="winner-hero">
    <div class="winner-hero-eyebrow">🏆 Gewonnen</div>
    <div class="winner-hero-users">${usersHtml || '<div style="color:var(--muted);font-size:0.85rem">–</div>'}</div>
    ${randomSpruch ? `<div class="winner-hero-spruch">"${esc(randomSpruch)}"</div>` : ''}
    <div class="winner-hero-footer">
      <span class="winner-hero-team">${esc(teamLabel)}</span>
      ${bet.result_description ? ` · <em style="color:var(--muted)">"${esc(bet.result_description)}"</em>` : ''}
    </div>
  </div>`;
}

function renderPot() {
  const potEl = document.getElementById('potBar');
  if (bet.status === 'resolved') { potEl.style.display = 'none'; return; }
  const kloinsA = participants.filter(p => p.side === 'A' && !p.stake_description).reduce((s,p) => s+p.amount, 0);
  const kloinsB = participants.filter(p => p.side === 'B' && !p.stake_description).reduce((s,p) => s+p.amount, 0);

function renderSides() {
  const payouts = calcPayouts();
  const partsA = participants.filter(p => p.side === 'A');
  const partsB = participants.filter(p => p.side === 'B');
  const isResolved = bet.status === 'resolved';
  const wonA = isResolved && bet.winner_side === 'A';
  const wonB = isResolved && bet.winner_side === 'B';

  // Non-Kloins stakes per side (losers' stakes shown to winners)
  const loserStakesA = partsA.filter(p => p.stake_description).map(p => parseStake(p));
  const loserStakesB = partsB.filter(p => p.stake_description).map(p => parseStake(p));

  function participantRows(parts, amountClass, isWinningSide) {
    if (parts.length === 0) return '<div class="no-participants">Noch niemand</div>';
    // Loser non-Kloins stakes = what the other side wagered
    const opponentNonKloins = isWinningSide === true
      ? (bet.winner_side === 'A' ? loserStakesB : loserStakesA)
      : [];
    return parts.map(p => {
      const prof = profiles[p.user_id] || {};
      const isMe = p.user_id === currentUser.id;
      const stake = parseStake(p);
      const pd = payouts[p.user_id];
      const avInner = prof.avatar_url
        ? `<img src="${esc(prof.avatar_url)}" alt="">`
        : esc(prof.avatar || '🎮');

      let rightHtml = '';
      if (stake.isKloins) {
        rightHtml = `<div class="participant-amount ${amountClass}">${p.amount.toLocaleString('de-DE')}</div>`;
        if (isResolved && pd && pd.profit > 0) {
          rightHtml += `<div class="participant-payout">+${pd.profit.toLocaleString('de-DE')}</div>`;
        }
      } else if (isResolved && isWinningSide && opponentNonKloins.length > 0) {
        // Show what this winner earns: all opposing non-Kloins stakes
        rightHtml = opponentNonKloins.map(s =>
          `<div class="participant-payout">${s.icon} ${esc(s.label)}</div>`
        ).join('');
      }

      return `<div class="participant-row">
        <div class="participant-name">
          <div class="participant-avatar">${avInner}</div>
          <div>
            <div class="participant-username">${esc(prof.username || 'User')}${isMe ? ' <span style="color:var(--muted);font-size:0.68rem">(du)</span>' : ''}</div>
            <div class="participant-stake">${stake.icon} ${esc(stake.label)}</div>
          </div>
        </div>
        <div class="participant-right">${rightHtml}</div>
      </div>`;
    }).join('');
  }

  const cardClassA = isResolved ? (wonA ? 'side-card side-card-a side-card-won' : 'side-card side-card-a side-card-lost') : 'side-card side-card-a';
  const cardClassB = isResolved ? (wonB ? 'side-card side-card-b side-card-won' : 'side-card side-card-b side-card-lost') : 'side-card side-card-b';
  const dotClassA = wonA ? 'side-card-dot' : 'side-card-dot side-card-dot-a';
  const dotClassB = wonB ? 'side-card-dot' : 'side-card-dot side-card-dot-b';

  document.getElementById('sidesGrid').innerHTML = `
    <div class="${cardClassA}">
      <div class="side-card-header">
        <div class="${dotClassA}" style="${wonA ? 'background:var(--neon-green);box-shadow:0 0 8px rgba(0,255,136,0.5)' : ''}"></div>
        <div class="side-card-label">${esc(bet.side_a_label)}</div>
      </div>
      ${participantRows(partsA, 'amount-a', wonA)}
    </div>
    <div class="${cardClassB}">
      <div class="side-card-header">
        <div class="${dotClassB}" style="${wonB ? 'background:var(--neon-green);box-shadow:0 0 8px rgba(0,255,136,0.5)' : ''}"></div>
        <div class="side-card-label">${esc(bet.side_b_label)}</div>
      </div>
      ${participantRows(partsB, 'amount-b', wonB)}
    </div>`;
}

  // Vorschlag: Bot auf Gegenseite des Erstellers setzen
  const myEntry = participants.find(p => p.user_id === currentUser.id);
  const oppSide = myEntry?.side === 'A' ? 'B' : 'A';
  document.getElementById('botSide').value = oppSide;
  document.getElementById('botOptA').textContent = bet.side_a_label;
  document.getElementById('botOptB').textContent = bet.side_b_label;
}

async function addBot() {
  const side = document.getElementById('botSide').value;
  const amount = parseInt(document.getElementById('botAmount').value.replace(/[^0-9]/g,''), 10);
  if (!amount || amount <= 0) return showAlert('Bitte einen Betrag eingeben.', 'error');

  document.getElementById('btnBot').disabled = true;
  document.getElementById('btnBot').textContent = 'Einbuche…';

  const { error } = await sb.rpc('add_test_participant', {
    p_bet_id: betId, p_side: side, p_amount: amount
  });

  if (error) {
    document.getElementById('btnBot').disabled = false;
    document.getElementById('btnBot').textContent = '🤖 Einbuchen';
    return showAlert('Fehler: ' + error.message, 'error');
  }
  showAlert('✓ KlausBot eingebucht!', 'success');
  setTimeout(() => location.reload(), 900);
}

function renderJoin() {
  const alreadyJoined = participants.some(p => p.user_id === currentUser.id);
  const canJoin = bet.status === 'open' && !alreadyJoined;
  const joinCard = document.getElementById('joinCard');
  if (!canJoin) { joinCard.style.display = 'none'; return; }
  joinCard.style.display = '';
  document.getElementById('joinBtnA').textContent = bet.side_a_label;
  document.getElementById('joinBtnB').textContent = bet.side_b_label;

  const typesEl = document.getElementById('joinStakeTypes');
  typesEl.innerHTML = STAKE_TYPES.map(t => `
    <button onclick="selectJoinStake('${t.id}')" data-id="${t.id}"
      style="display:flex;align-items:center;gap:0.3rem;padding:0.4rem 0.75rem;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--muted);font-family:inherit;font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.18s;white-space:nowrap${t.id==='kloins'?';background:rgba(245,255,0,0.1);border-color:rgba(245,255,0,0.4);color:var(--neon-yellow)':''}"
      class="join-stake-btn">${t.icon} ${t.label}</button>`).join('');
  renderJoinFields('kloins');
}

function selectJoinStake(id) {
  joinStakeType = id;
  document.querySelectorAll('.join-stake-btn').forEach(b => {
    const active = b.dataset.id === id;
    b.style.background = active ? 'rgba(245,255,0,0.1)' : 'rgba(255,255,255,0.03)';
    b.style.borderColor = active ? 'rgba(245,255,0,0.4)' : 'var(--border)';
    b.style.color = active ? 'var(--neon-yellow)' : 'var(--muted)';
  });
  renderJoinFields(id);
}

function renderJoinFields(id) {
  const type = STAKE_TYPES.find(t => t.id === id);
  const el = document.getElementById('joinStakeFields');
  const inputStyle = 'width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:9px;padding:0.7rem 0.9rem;color:var(--text);font-size:0.95rem;font-family:inherit;outline:none;transition:border-color 0.2s';
  const labelStyle = 'display:block;font-size:0.75rem;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.4rem';
  const pillStyle = 'padding:0.3rem 0.7rem;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:#666;font-size:0.75rem;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all 0.15s';

  if (type.isKloins) {
    el.innerHTML = `
      <label style="${labelStyle}">Betrag (Kloins) *</label>
      <input type="text" id="joinAmount" placeholder="z.B. 100" maxlength="7" value="100" style="${inputStyle};margin-bottom:0.5rem">
      <div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.8rem">Kontostand: <span style="color:var(--neon-yellow);font-weight:800">${userKloins.toLocaleString('de-DE')}</span> Kloins</div>`;
  } else {
    const suggestions = STAKE_SUGGESTIONS[id] || [];
    const pillsHtml = suggestions.length ? `
      <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.5rem;margin-bottom:0.8rem">
        ${suggestions.map(s => `<button style="${pillStyle}" onclick="pickJoinSuggestion('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('')}
      </div>` : '<div style="margin-bottom:0.8rem"></div>';
    el.innerHTML = `
      <label style="${labelStyle}">${type.label} *</label>
      <input type="text" id="joinStakeDesc" placeholder="${type.placeholder}" maxlength="150" style="${inputStyle}">
      ${pillsHtml}`;
  }
}

function pickJoinSuggestion(value) {
  const input = document.getElementById('joinStakeDesc');
  if (input) { input.value = value; input.focus(); }
}

function selectJoinSide(side) {
  joinSide = side;
  document.getElementById('joinBtnA').classList.toggle('selected', side === 'A');
  document.getElementById('joinBtnB').classList.toggle('selected', side === 'B');
}

async function joinBet() {
  if (!joinSide) return showAlert('Bitte eine Seite wählen.', 'error');

  const type = STAKE_TYPES.find(t => t.id === joinStakeType);
  let amount = 1;
  let stakeDesc = null;

  if (type.isKloins) {
    amount = parseInt((document.getElementById('joinAmount')?.value || '').replace(/[^0-9]/g,''), 10);
    if (!amount || amount <= 0) return showAlert('Bitte einen Kloins-Betrag eingeben.', 'error');
    if (amount > userKloins) return showAlert(`Du hast nur ${userKloins.toLocaleString('de-DE')} Kloins.`, 'error');
  } else {
    const descVal = document.getElementById('joinStakeDesc')?.value.trim();
    if (!descVal) return showAlert(`Bitte deinen ${type.label}-Einsatz beschreiben.`, 'error');
    stakeDesc = `${type.id}:${descVal}`;
  }

  document.getElementById('btnJoin').disabled = true;
  document.getElementById('btnJoin').textContent = 'Einsteigen…';

  const { error } = await sb.from('bet_participants').insert({
    bet_id: betId, user_id: currentUser.id, side: joinSide, amount, stake_description: stakeDesc
  });

  if (error) {
    document.getElementById('btnJoin').disabled = false;
    document.getElementById('btnJoin').textContent = 'Jetzt einsteigen →';
    return showAlert('Fehler: ' + error.message, 'error');
  }

  if (type.isKloins) {
    await sb.from('profiles').update({ kloins: userKloins - amount }).eq('id', currentUser.id);
  }
  showAlert('✓ Erfolgreich eingestiegen!', 'success');
  setTimeout(() => location.reload(), 900);
}

function renderResultSection() {
  if (bet.status === 'resolved') {
    // Open/closed form hidden; show dezente "korrigieren" option
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('changeResultWrap').style.display = '';

    const btns = document.getElementById('changeResultBtns');
    btns.innerHTML = `
      <button class="result-btn" id="crA" onclick="selectChange('A')">${esc(bet.side_a_label)} gewinnt</button>
      <button class="result-btn" id="crB" onclick="selectChange('B')">${esc(bet.side_b_label)} gewinnt</button>
      <button class="result-btn" id="crDraw" onclick="selectChange('draw')">Unentschieden</button>`;

    if (bet.winner_side) {
      selectChange(bet.winner_side);
      if (bet.result_description) document.getElementById('changeResultDesc').value = bet.result_description;
    }
  } else {
    // Not yet resolved: show full form
    document.getElementById('changeResultWrap').style.display = 'none';
    document.getElementById('resultCard').style.display = '';

    const btns = document.getElementById('resultBtns');
    btns.innerHTML = `
      <button class="result-btn" id="rbA" onclick="selectResult('A')">${esc(bet.side_a_label)} gewinnt</button>
      <button class="result-btn" id="rbB" onclick="selectResult('B')">${esc(bet.side_b_label)} gewinnt</button>
      <button class="result-btn" id="rbDraw" onclick="selectResult('draw')">Unentschieden</button>`;
  }
}

function selectResult(side) {
  resultSide = side;
  document.getElementById('rbA').className    = 'result-btn' + (side==='A' ? ' sel-a' : '');
  document.getElementById('rbB').className    = 'result-btn' + (side==='B' ? ' sel-b' : '');
  document.getElementById('rbDraw').className = 'result-btn' + (side==='draw' ? ' sel-draw' : '');
}

function selectChange(side) {
  changeSide = side;
  document.getElementById('crA').className    = 'result-btn' + (side==='A' ? ' sel-a' : '');
  document.getElementById('crB').className    = 'result-btn' + (side==='B' ? ' sel-b' : '');
  document.getElementById('crDraw').className = 'result-btn' + (side==='draw' ? ' sel-draw' : '');
}

function toggleChangeResult() {
  const form = document.getElementById('changeResultForm');
  const arrow = document.getElementById('changeResultArrow');
  const open = form.style.display === 'none';
  form.style.display = open ? '' : 'none';
  arrow.textContent = open ? '▾' : '▸';
}

async function submitResult(isChange) {
  const side = isChange ? changeSide : resultSide;
  if (!side) return showAlert('Bitte einen Gewinner wählen.', 'error');
  const descId = isChange ? 'changeResultDesc' : 'resultDesc';
  const btnId  = isChange ? 'btnResolveChange' : 'btnResolve';
  const desc = document.getElementById(descId).value.trim();

  document.getElementById(btnId).disabled = true;
  document.getElementById(btnId).textContent = 'Speichert…';

  if (bet.winner_side) {
    await sb.from('bet_result_history').insert({
      bet_id: betId, changed_by: currentUser.id,
      old_result: bet.result_description || null, new_result: desc || null,
      old_winner_side: bet.winner_side, new_winner_side: side
    });
  }

  const { error } = await sb.from('bets').update({
    status: 'resolved', winner_side: side,
    result_description: desc || null,
    resolved_at: new Date().toISOString(), resolved_by: currentUser.id
  }).eq('id', betId);

  if (error) {
    document.getElementById(btnId).disabled = false;
    document.getElementById(btnId).textContent = isChange ? 'Korrektur speichern →' : 'Ergebnis speichern →';
    return showAlert('Fehler: ' + error.message, 'error');
  }

  const wasResolved = bet.status === 'resolved';
  const sideChanged = bet.winner_side !== side;
  if (!wasResolved || sideChanged) {
    await distributeKloins(side, wasResolved ? bet.winner_side : null);
  }

  showAlert('✓ Ergebnis gespeichert!', 'success');
  setTimeout(() => location.reload(), 900);
}

async function distributeKloins(winnerSide, previousWinnerSide) {
  const { error } = await sb.rpc('distribute_bet_kloins', {
    p_bet_id: betId,
    p_winner_side: winnerSide,
    p_previous_winner_side: previousWinnerSide || null
  });
  if (error) console.error('Kloins-Verteilung fehlgeschlagen:', error);
}

async function renderHistory() {
  const { data: history } = await sb.from('bet_result_history')
    .select('*').eq('bet_id', betId).order('changed_at', { ascending: false });

  if (!history || history.length === 0) {
    document.getElementById('historyCard').style.display = 'none';
    return;
  }

  document.getElementById('historyCard').style.display = '';

  const changerIds = [...new Set(history.map(h => h.changed_by))];
  const { data: changerProfs } = await sb.from('profiles').select('id, username, avatar').in('id', changerIds);
  const changerMap = {};
  (changerProfs || []).forEach(p => { changerMap[p.id] = p; });

  const sideLabel = s => s === 'A' ? bet.side_a_label : s === 'B' ? bet.side_b_label : 'Unentschieden';

  document.getElementById('historyEntries').innerHTML = history.map(h => {
    const changer = changerMap[h.changed_by] || {};
    return `
      <div class="history-entry">
        <div class="history-entry-header">
          <span class="history-entry-by">${esc(changer.avatar || '🎮')} ${esc(changer.username || 'User')}</span>
          <span class="history-entry-time">${fmtDate(h.changed_at)}</span>
        </div>
        <div class="history-entry-change">
          <strong>${esc(sideLabel(h.old_winner_side))}</strong> → <strong>${esc(sideLabel(h.new_winner_side))}</strong>
          ${h.new_result ? ` · ${esc(h.new_result)}` : ''}
        </div>
      </div>`;
  }).join('');
}

function toggleHistory() {
  const entries = document.getElementById('historyEntries');
  const icon = document.getElementById('historyIcon');
  entries.classList.toggle('open');
  icon.classList.toggle('open');
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = '../../login/';
}

function showAlert(msg, type) {
  const el = document.getElementById('alertBox');
  el.textContent = msg; el.className = 'alert ' + type;
  if (type === 'error') setTimeout(() => { el.className = 'alert'; }, 4000);
}

function setNavAvatar(el, profile) {
  if (!profile) return;
  if (profile.avatar_url) {
    el.textContent = '';
    const img = document.createElement('img');
    img.src = profile.avatar_url;
    el.appendChild(img);
  } else if (profile.avatar) {
    el.textContent = profile.avatar;
  }
}

init();
</script>
</body>
</html>
